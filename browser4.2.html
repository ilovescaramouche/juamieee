<!DOCTYPE html>
<html>
<head>
<title>Prompt Box</title>

<script type="text/javascript">
function show_prompt()
{
var name = prompt("Please enter your name:", "nameless");

if(name != null && name != "")
{
document.write("Welcome " + name + "! \nPlease come in");
}
}
</script>

</head>

<body>

<input type="button" onclick="show_prompt()" value="Show Prompt">

</body>
</html>
